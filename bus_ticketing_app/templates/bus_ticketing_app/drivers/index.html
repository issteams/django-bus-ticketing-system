{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Sign Up</title>
    <link rel="stylesheet" href="{% static 'bus_ticketing_app/drivers/style.css' %}">

    <style>
        .signup{
        padding-top: 5px;
      }

      .asignup {
        text-decoration: none;
        /* background-color: #0dd60d; */
        /* color:rgb(252, 247, 247); */
        width: 100%;
        height: 100%;
      }
    </style>

</head>
<body>
<div class="container">
    <div class="title">Registration</div>
    <form action="{% url 'bus_ticketing_app:driverSignUp' %}" method="post">
        {% csrf_token %}
        <div class="user-details">
            <div class="input-box">
                <span class="details">Full Name</span>
                <input type="text" placeholder="Enter your name" name="name">
            </div>
            <div class="input-box">
                <span class="details">Username</span>
                <input type="text" placeholder="Enter your Username" name="username">
            </div>
            <div class="input-box">
                <span class="details">Email</span>
                <input type="email" placeholder="Enter your email" name="email">
            </div>
            <div class="input-box">
                <span class="details">Phone Number</span>
                <input type="text" placeholder="Enter your number" name="phone_number">
            </div>
            {% if message %}
                {{ message }}
            {% endif %}
            <div class="input-box">
                <span class="details">Password</span>
                <input type="password" placeholder="Enter your password" name="password">
                <i class="fa fa-eye-slash" id="togglePassword"></i>
            </div>
            <div class="input-box">
                <span class="details">Confirm Password</span>
                <input type="password" placeholder="Confirm your password" name="comfirm_password">
            </div>

            <div class="button">
                <input type="submit" value="Register">
            </div>
            <p class="signup">Already Have an Account?<a class="asignup" href="{% url 'bus_ticketing_app:driverlogin' %}">Login</a></p>
        </div>
    </form>
</div>
</body>
</html>
